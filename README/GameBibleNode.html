<header><div class="logo"><h1>🎮 Game Bible - Node System V6.23</h1><p>Darkmode · klik tag = invoegen in tekstmodus · tag-navigatie per node · auto title linking · vertical ports · smart snap stack</p></div><div class="toolbar"><button id="btn-undo" class="mini" disabled>↩</button><button id="btn-redo" class="mini" disabled>↪</button><button id="btn-add-node" class="primary">+ Node</button><button id="btn-add-field" class="green">+ Veld</button><label class="snap-toggle" title="Snap nodes en velden naar het grid"><input id="snap-toggle" type="checkbox" /> Snap</label><button id="btn-stack" title="Zet alle categorieen strak onder elkaar met extra ruimte">Stack</button><button id="btn-link-titles" title="Koppel losse tagwaarden in node-titels automatisch aan tags">Koppel titels</button><button id="btn-fit">Fit</button><button id="btn-export">Export</button><button id="btn-save">Opslaan</button><div id="save-status">Laden...</div><div id="auth-panel" class="auth-panel"><span id="auth-status" class="auth-status">Niet ingelogd</span><input id="auth-password" class="auth-password" type="password" autocomplete="current-password" placeholder="Wachtwoord" /><button id="btn-auth-login" class="primary">Login</button><button id="btn-auth-logout" class="toggle-btn" style="display:none">Logout</button><span id="auth-message" class="auth-message"></span></div></div></header>

<script>

let viewport,world,nodesLayer,categoriesLayer,edgesLayer,selectionBox,mentionMenu,appMain;

const MAX_HISTORY=80,MIN_ZOOM=.06,MAX_ZOOM=1.8,GAMEBIBLE_SAVE_ROUTE='/README/GameBibleNode.php',GAMEBIBLE_AUTH_ROUTE='/README/GameBibleNode.auth.php',$=(s,r=document)=>r.querySelector(s),$$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const uid=p=>p+'-'+Date.now().toString(36)+'-'+Math.random().toString(36).slice(2,7);
function isVerticalSide(side){return side==='top'||side==='bottom'}function edgeFromSide(e){return e?.fromSide||'out'}function edgeToSide(e){return e?.toSide||'in'}function isSnapEnabled(){return !!(appData.settings&&appData.settings.snapToGrid)}function snapGridValue(v){const grid=Number(appData.settings?.snapGrid)||24;return Math.round(v/grid)*grid}function snapValue(v){return isSnapEnabled()?snapGridValue(v):Math.round(v)}function stackGap(){return Number(appData.settings?.stackGap)||72}function syncSnapToggle(){const el=$('#snap-toggle');if(el)el.checked=isSnapEnabled()}
const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function setStatus(msg,state){const el=$('#save-status');el.textContent=msg;el.className=state||''}function toast(msg){const el=$('#toast');el.textContent=msg;clearTimeout(toast.t);toast.t=setTimeout(()=>{el.textContent=''},4200)}function cookieValue(name){const prefix=name+'=';return document.cookie.split(';').map(v=>v.trim()).find(v=>v.startsWith(prefix))?.slice(prefix.length)||''}
